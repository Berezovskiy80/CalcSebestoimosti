<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Точный Калькулятор Себестоимости</title>
    <style>
        /* Основные стили */
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 10px; margin: 0; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 1.2rem; }
        
        /* Стили для строк ввода */
        .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input, select { flex: 1; min-width: 120px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* Кнопки */
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #3498db; color: white; width: 100%; margin-bottom: 10px; }
        .btn-calc { background: #27ae60; color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        .btn-del { background: #e74c3c; color: white; padding: 10px 15px; min-width: 44px; }
        
        /* Результаты */
        #results { margin-top: 20px; padding: 15px; background: #e8f5e9; border: 2px solid #2ecc71; border-radius: 10px; }
        .res-line { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; }

        /* Адаптивность: на очень узких экранах кнопки удаления уходят вправо */
        @media (max-width: 400px) {
            input, select { min-width: 100%; }
            .btn-del { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>1. Цены (руб/кг)</h2>
    <div id="price-inputs">
        <div class="row price-row">
            <input type="text" placeholder="Продукт (н-р, Мясо)" class="p-name" oninput="updateOptions()">
            <input type="number" placeholder="Цена" class="p-val">
        </div>
    </div>
    <button class="btn-add" onclick="addPriceField()">+ Добавить продукт</button>

    <h2>2. Рецепт (грамм в 1 шт)</h2>
    <div id="recipe-inputs">
        <div class="row recipe-row">
            <select class="r-select"></select>
            <input type="number" placeholder="Грамм" class="r-weight">
        </div>
    </div>
    <button class="btn-add" onclick="addRecipeField()">+ Добавить в рецепт</button>

    <button class="btn-calc" onclick="finalCalculate()">ПОСЧИТАТЬ ИТОГО</button>

    <div id="results" style="display:none;">
        <div class="res-line">
            <span>Себестоимость:</span>
            <span id="total-res">0</span>
        </div>
    </div>
</div>

<script>
    // Тот же надежный движок расчета, что и раньше
    function addPriceField() {
        const div = document.createElement('div');
        div.className = 'row price-row';
        div.innerHTML = `
            <input type="text" placeholder="Продукт" class="p-name" oninput="updateOptions()">
            <input type="number" placeholder="Цена" class="p-val">
            <button class="btn-del" onclick="this.parentElement.remove();updateOptions()">×</button>`;
        document.getElementById('price-inputs').appendChild(div);
    }

    function addRecipeField() {
        const div = document.createElement('div');
        div.className = 'row recipe-row';
        div.innerHTML = `
            <select class="r-select"></select>
            <input type="number" placeholder="Грамм" class="r-weight">
            <button class="btn-del" onclick="this.parentElement.remove()">×</button>`;
        document.getElementById('recipe-inputs').appendChild(div);
        updateOptions();
    }

    function updateOptions() {
        const names = Array.from(document.querySelectorAll('.p-name')).map(i => i.value).filter(v => v !== "");
        document.querySelectorAll('.r-select').forEach(sel => {
            const current = sel.value;
            sel.innerHTML = '<option value="">Выбери...</option>' + 
                            names.map(n => `<option value="${n}">${n}</option>`).join('');
            sel.value = current;
        });
    }

    function finalCalculate() {
        const prices = {};
        document.querySelectorAll('.price-row').forEach(row => {
            const n = row.querySelector('.p-name').value;
            const v = parseFloat(row.querySelector('.p-val').value);
            if (n && !isNaN(v)) prices[n] = v;
        });

        let total = 0;
        document.querySelectorAll('.recipe-row').forEach(row => {
            const name = row.querySelector('.r-select').value;
            const weight = parseFloat(row.querySelector('.r-weight').value);
            
            if (name && !isNaN(weight) && prices[name]) {
                total += (prices[name] * weight) / 1000;
            }
        });

        document.getElementById('total-res').innerText = total.toFixed(2) + " руб.";
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
